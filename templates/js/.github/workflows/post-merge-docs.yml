name: Post-Merge Docs Update

on:
  pull_request:
    types: [closed]
    branches:
      - dev
      - prod

jobs:
  update-docs:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect changed files
        id: changed
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.merge_commit_sha }}"

          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # 라우트/컨트롤러 변경 여부 감지
          if echo "$CHANGED" | grep -qE "(^|/)(.*\.(controller|router|route)\.(ts|js)|route\.ts)$"; then
            echo "has_route_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_route_changes=false" >> $GITHUB_OUTPUT
          fi

          # CLAUDE.md 변경 여부 감지
          if echo "$CHANGED" | grep -q "CLAUDE.md"; then
            echo "has_claude_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_claude_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create API docs update issue (if routes changed)
        if: steps.changed.outputs.has_route_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const prTitle = context.payload.pull_request.title;
            const changedFiles = `${{ steps.changed.outputs.changed_files }}`;

            const routeFiles = changedFiles.split('\n')
              .filter(f => /(^|\/)(.*\.(controller|router|route)\.(ts|js)|route\.ts)$/.test(f))
              .map(f => `- \`${f}\``)
              .join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[DOCS] API 문서 갱신 필요 — #${prNumber} ${prTitle}`,
              body: [
                '## 개요',
                `PR #${prNumber} 머지로 인해 아래 라우트/컨트롤러 파일이 변경되었습니다.`,
                '`docs/api/` 문서를 현재 코드와 동기화해주세요.',
                '',
                '## 변경된 라우트/컨트롤러 파일',
                routeFiles,
                '',
                '## 작업 방법',
                '1. 각 파일의 엔드포인트 변경사항 확인',
                '2. `docs/api/{module}.md` 파일 갱신 (추가·수정·삭제된 엔드포인트 반영)',
                '3. 이 이슈를 참조하는 PR 생성 후 머지',
                '',
                '> 이 이슈는 `post-merge-docs.yml` 워크플로우에 의해 자동 생성되었습니다.'
              ].join('\n'),
              labels: ['documentation']
            });

